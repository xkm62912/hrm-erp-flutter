name: hrm_erp
description: Employee Management ERP + CRM + Payroll — Flutter & Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Backend ──────────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── State Management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Data / Serialization ─────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── Charts ───────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── PDF Generation ───────────────────────────────────────────
  pdf: ^3.11.0
  printing: ^5.13.0

  # ── Local Storage ────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # ── UI ───────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # ── File Handling ────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # ── Notifications ────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # ── Forms ────────────────────────────────────────────────────
  reactive_forms: ^17.0.1

  # ── Icons ────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──────────────────────────────────────────
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  # ── Linting ──────────────────────────────────────────────────
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/

  # Uncomment if adding Inter font via Google Fonts or local assets:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
