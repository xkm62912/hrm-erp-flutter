name: hrm_erp
description: Employee Management ERP + CRM + Payroll
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State Management — plain Riverpod, no code gen
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # PDF
  pdf: ^3.11.0
  printing: ^5.13.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # File
  image_picker: ^1.1.2
  path_provider: ^2.1.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/
