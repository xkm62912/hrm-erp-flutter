name: 🚀 Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 🤖 Bootstrap Android project
        run: |
          # Save our source files
          cp -r lib /tmp/hrm_lib
          cp pubspec.yaml /tmp/hrm_pubspec.yaml
          cp analysis_options.yaml /tmp/hrm_analysis.yaml || true

          # Create full Flutter project (generates android/ ios/ etc.)
          flutter create \
            --project-name hrm_erp \
            --org com.hrmerp \
            --platforms android \
            . 

          # Restore our actual source code
          rm -rf lib
          cp -r /tmp/hrm_lib lib
          cp /tmp/hrm_pubspec.yaml pubspec.yaml
          cp /tmp/hrm_analysis.yaml analysis_options.yaml || true

          echo "✅ Project bootstrapped with our source code"
          ls -la

      - name: 🔧 Set min SDK 21
        run: |
          # Gradle with Kotlin DSL
          if grep -q "minSdk = flutter.minSdkVersion" android/app/build.gradle.kts 2>/dev/null; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' android/app/build.gradle.kts
          fi
          # Gradle with Groovy DSL
          if grep -q "minSdkVersion flutter.minSdkVersion" android/app/build.gradle 2>/dev/null; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/' android/app/build.gradle
          fi
          # Check result
          grep -r "minSdk" android/app/build.gradle* 2>/dev/null || true

      - name: 🌐 Add internet permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i 's/<manifest xmlns:android/<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android/' "$MANIFEST" 2>/dev/null || true
            sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/' "$MANIFEST"
          fi
          cat "$MANIFEST"

      - name: 📦 Flutter pub get
        run: flutter pub get

      - name: ⚙️ Build runner (code generation)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: 🔍 Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: 🏗️ Build APK
        run: |
          flutter build apk --release --no-shrink \
            --dart-define=SUPABASE_URL=https://iuuzzlcyaduhmhkfecgp.supabase.co \
            "--dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1dXp6bGN5YWR1aG1oa2ZlY2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjMxNjYsImV4cCI6MjA5NzkzOTE2Nn0.vKCOwTXe5m36Zs6hCVbDQeqecYvml8hiaAM0irudgtA"

      - name: 📦 Collect APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk \
             "output/HRM-ERP-v1.0.${{ github.run_number }}.apk"
          ls -lh output/

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HRM-ERP-APK
          path: output/*.apk
          retention-days: 30

      - name: 🎉 Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "📱 HRM ERP v1.0.${{ github.run_number }}"
          body: |
            ## 📱 HRM ERP — Android APK

            ### 📲 Install Instructions
            1. **Download** the `.apk` file below
            2. On your Android phone go to **Settings → Security → Install unknown apps** → Enable
            3. Open the downloaded APK → tap **Install**
            4. Open the app and **login** with:
               - The email & password you created in Supabase Auth

            ### ✅ Modules Included
            | Module | Features |
            |---|---|
            | 🏠 Dashboard | KPI cards, attendance chart, payroll trend, dept pie chart |
            | 👥 Employees | List, search, add, edit, detail view |
            | 🕐 Attendance | Clock in/out, monthly calendar heatmap |
            | 🏖️ Leave | Apply, balance tracker, manager approval |
            | 💰 Payroll | Monthly run, payslip PDF generator |
            | 🤝 CRM | Leads pipeline, lead form, client list |

            ### 🔗 Backend
            - **Supabase:** `iuuzzlcyaduhmhkfecgp.supabase.co`
            - **16 tables** with RLS · **7 triggers** · **32 policies**

          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
