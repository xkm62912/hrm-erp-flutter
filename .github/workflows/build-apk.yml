name: 🚀 Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Bootstrap Android scaffold
        run: |
          # Stash our files
          cp -r lib /tmp/src_lib
          cp pubspec.yaml /tmp/src_pubspec.yaml

          # Create full project scaffold (generates android/ folder)
          flutter create --project-name hrm_erp --org com.hrmerp --platforms android .

          # Restore our source
          rm -rf lib
          cp -r /tmp/src_lib lib
          cp /tmp/src_pubspec.yaml pubspec.yaml

      - name: Configure Android SDK version
        run: |
          FILE_KTS="android/app/build.gradle.kts"
          FILE_GROOVY="android/app/build.gradle"
          if [ -f "$FILE_KTS" ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' "$FILE_KTS"
            echo "Updated $FILE_KTS"
            grep "minSdk" "$FILE_KTS" || true
          fi
          if [ -f "$FILE_GROOVY" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' "$FILE_GROOVY"
            echo "Updated $FILE_GROOVY"
            grep "minSdkVersion" "$FILE_GROOVY" || true
          fi

      - name: Add Internet permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          grep -q "INTERNET" "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' "$MANIFEST"
          echo "Manifest:"
          cat "$MANIFEST"

      - name: flutter pub get
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        run: |
          flutter build apk --release \
            "--dart-define=SUPABASE_URL=https://iuuzzlcyaduhmhkfecgp.supabase.co" \
            "--dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1dXp6bGN5YWR1aG1oa2ZlY2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjMxNjYsImV4cCI6MjA5NzkzOTE2Nn0.vKCOwTXe5m36Zs6hCVbDQeqecYvml8hiaAM0irudgtA"

      - name: Rename & stage APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk \
             "output/HRM-ERP-v1.0.${{ github.run_number }}.apk"
          ls -lh output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HRM-ERP-APK
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "📱 HRM ERP v1.0.${{ github.run_number }}"
          body: |
            ## 📱 HRM ERP Android App

            ### 📲 How to install on Android
            1. Download `HRM-ERP-*.apk` from the Assets below
            2. On your phone: **Settings → Security → Unknown sources → Allow**
            3. Open the APK file → tap **Install**
            4. Login with your Supabase email & password

            ### ✅ Modules
            Dashboard · Employees · Attendance · Leave · Payroll · CRM

            ### 🔗 Backend: Supabase `iuuzzlcyaduhmhkfecgp`
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
