workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17
      vars:
        SUPABASE_URL: "https://iuuzzlcyaduhmhkfecgp.supabase.co"
        SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1dXp6bGN5YWR1aG1oa2ZlY2dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjMxNjYsImV4cCI6MjA5NzkzOTE2Nn0.vKCOwTXe5m36Zs6hCVbDQeqecYvml8hiaAM0irudgtA"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Bootstrap Android scaffold
        script: |
          cp -r lib /tmp/src_lib
          cp pubspec.yaml /tmp/src_pubspec.yaml
          flutter create --project-name hrm_erp --org com.hrmerp --platforms android .
          rm -rf lib
          cp -r /tmp/src_lib lib
          cp /tmp/src_pubspec.yaml pubspec.yaml
          echo "Files restored:"
          ls lib/

      - name: Configure Android build
        script: |
          # Set minSdk and compileSdk explicitly — fixes app_links Gradle error
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              echo "--- Before: $f ---"
              cat "$f"
              sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' "$f"
              sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' "$f"
              sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' "$f"
              sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' "$f"
              sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' "$f"
              sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' "$f"
              echo "--- After: $f ---"
              cat "$f"
            fi
          done

          # Write local.properties with explicit flutter.sdk path
          FLUTTER_ROOT=$(flutter --version --machine 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('flutterRoot',''))" 2>/dev/null || dirname $(dirname $(which flutter)))
          echo "Flutter root: $FLUTTER_ROOT"
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          echo "--- local.properties ---"
          cat android/local.properties

      - name: Write AndroidManifest
        script: |
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <application
                  android:label="HRM ERP"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          MANIFEST

      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
        ignore_failure: true

      - name: Build APK
        script: |
          flutter build apk --release \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - xebecbd666@gmail.com
        notify:
          success: true
          failure: true
