workflows:
  android-release:
    name: Android Release APK
    max_build_duration: 60
    environment:
      flutter: 3.24.0
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos --no-fatal-warnings
        ignore_failure: true

      - name: Build Release APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - xebecbd666@gmail.com
        notify:
          success: true
          failure: true
